<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JKJ92 History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-shell">
    <div class="app">

      <header class="top-header">
        <div class="top-row">
          <div class="mini-logo">LOGO</div>
          <div class="brand-wrap">
            <div class="brand">JKJ92</div>
            <div class="brand-sub">JOM JUDI BET</div>
          </div>
          <div class="lang-wrap">
            <span class="flag">🇬🇧</span>
            <span class="lang-text">EN</span>
          </div>
        </div>

        <div class="notice-bar">
          <div class="notice-track" id="tickerText">
            the more you SHARE the more you GET! 😍 😘 😘 &nbsp;&nbsp; Banned all Funky Monkey Members
          </div>
        </div>
      </header>

      <main class="content">
        <div class="tab-pill">Transaction</div>

        <section class="history-box">
          <div class="history-head">
            <div>Transaction</div>
            <div>Status</div>
          </div>

          <div id="transactionList"></div>
        </section>
      </main>

      <div class="promo-bar" id="promoBar">
        <div class="promo-text">🎁 FREE CREDIT 365 DAYS</div>
        <button class="promo-close" id="closePromo">×</button>
      </div>

      <nav class="bottom-nav">
        <div class="nav-item">
          <div class="nav-icon">🏠</div>
          <div class="nav-label">Home</div>
        </div>
        <div class="nav-item active">
          <div class="nav-icon">🕘</div>
          <div class="nav-label">History</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">💬</div>
          <div class="nav-label">Chat</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">⚙️</div>
          <div class="nav-label">Settings</div>
        </div>
      </nav>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
