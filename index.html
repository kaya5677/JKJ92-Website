<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History Template</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="phone">
      <header class="header">
        <div class="header-top">
          <div class="mini-logo">LOGO</div>
          <div class="brand-wrap">
            <div class="brand">JKJ92</div>
            <div class="brand-sub">JOM BET NOW</div>
          </div>
          <div class="lang-box">
            <span class="flag">🇬🇧</span>
            <span>EN</span>
          </div>
        </div>

        <div class="ticker-bar">
          <div class="ticker-track" id="tickerText">
            the more you SHARE the more you GET! 😍 😘 😘 Banned all Funky Monkey Members
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="tabs-row">
          <div class="tab active">Transaction</div>
        </div>

        <section class="history-card">
          <div class="table-head">
            <div>Transaction</div>
            <div>Status</div>
          </div>

          <div id="transactionList"></div>
        </section>
      </main>

      <div class="promo-wrap" id="promoBanner">
        <div class="promo-text" id="promoText">FREE CREDIT 365 DAYS</div>
        <button class="promo-close" id="closePromoBtn">×</button>
      </div>

      <nav class="bottom-nav">
        <div class="nav-item">
          <div class="icon">🏠</div>
          <div class="label">Home</div>
        </div>
        <div class="nav-item active">
          <div class="icon">🕘</div>
          <div class="label">History</div>
        </div>
        <div class="nav-item">
          <div class="icon">💬</div>
          <div class="label">Chat</div>
        </div>
        <div class="nav-item">
          <div class="icon">⚙️</div>
          <div class="label">Settings</div>
        </div>
      </nav>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
